version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    # Bundle every github-actions update into a single monthly PR instead of
    # one PR per action. Avoids the mutual merge conflicts that separate PRs
    # cause once the first one lands (each touches the same pinned-SHA lines
    # in the workflow files).
    groups:
      github-actions:
        patterns:
          - "*"
